version: '3.1'

services:
  db:
    image: postgres:18
    restart: always
    container_name: project-delivery-manager-postgres
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: project_delivery_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
